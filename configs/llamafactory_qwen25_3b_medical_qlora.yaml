model_name_or_path: E:/sft/models/Qwen2.5-3B-Instruct
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05

dataset: medical_r1_zh
dataset_dir: data/llamafactory
template: qwen
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 1
dataloader_num_workers: 0

output_dir: outputs/lf-qwen25-3b-medical-lora
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true
save_total_limit: 2

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0

fp16: true
bf16: false
gradient_checkpointing: true
quantization_bit: 4
optim: paged_adamw_8bit

val_size: 0.03
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100
